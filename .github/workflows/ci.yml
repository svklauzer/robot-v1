name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend — compile, route uniqueness, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Syntax check — main.py must compile
        run: python -m py_compile main.py

      - name: Syntax check — all service modules
        run: |
          find . -name "*.py" -not -path "*/migrations/*" \
            -not -path "*/__pycache__/*" \
            | xargs python -m py_compile

      - name: Run pytest
        env:
          APP_ENV: development
          DB_AUTO_CREATE_SCHEMA: "true"
          POSTGRES_HOST: localhost
          HTX_API_KEY: ""
          HTX_API_SECRET: ""
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_OWNER_CHAT_ID: "0"
          ALLOW_MARKET_MOCK: "true"
        run: |
          python -m pytest tests/ -v --tb=short -q \
            --ignore=tests/test_production_runbook.py \
            2>&1

      - name: Production runbook file checks
        # Script smoke requires bash + docker; only check file-based assertions.
        run: |
          python -m pytest tests/test_production_runbook.py \
            -k "not backup_restore_smoke" \
            -v --tb=short

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true   # frontend types may be in flux; warn only

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
        continue-on-error: true   # warn only until frontend is stabilised
