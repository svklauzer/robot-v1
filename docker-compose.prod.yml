services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-robot}
      POSTGRES_USER: ${POSTGRES_USER:-robot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robot} -d ${POSTGRES_DB:-robot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-migrate:
    build: ./apps/api
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_AUTO_CREATE_SCHEMA: "false"
      POSTGRES_DB: ${POSTGRES_DB:-robot}
      POSTGRES_USER: ${POSTGRES_USER:-robot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for production}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "alembic", "-c", "alembic.ini", "upgrade", "head"]
    restart: "no"

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production
      DB_AUTO_CREATE_SCHEMA: "false"
      POSTGRES_DB: ${POSTGRES_DB:-robot}
      POSTGRES_USER: ${POSTGRES_USER:-robot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for production}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.get('http://127.0.0.1:8000/system/health', timeout=5); raise SystemExit(0 if r.status_code == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
